<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Health Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"/>
  <style>
    *{font-family:'Inter',sans-serif;box-sizing:border-box}
    .mono{font-family:'JetBrains Mono',monospace}
    body{background:#03040a;color:#fff;min-height:100vh}
    .glass{background:rgba(255,255,255,.04);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08)}
    .glass-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:20px}
    .accent{color:#818cf8}
    .emerald{color:#34d399}
    .xp-bar{background:rgba(255,255,255,.08);border-radius:999px;height:10px;overflow:hidden}
    .xp-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#6366f1,#818cf8);transition:width 1.5s ease}
    .stat-badge{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px 18px;text-align:center}
    .stat-value{font-size:24px;font-weight:700;line-height:1}
    .stat-label{font-size:11px;color:rgba(255,255,255,.4);margin-top:4px;text-transform:uppercase;letter-spacing:.05em}
    .insight-card{border-radius:12px;padding:14px 16px;font-size:13px;line-height:1.5}
    .insight-positive{background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.2);color:#6ee7b7}
    .insight-negative{background:rgba(251,146,60,.08);border:1px solid rgba(251,146,60,.2);color:#fdba74}
    .insight-critical{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#fca5a5}
    .heatmap-cell{width:16px;height:16px;border-radius:3px;display:inline-block;margin:1px}
    .streak-fire{font-size:32px;line-height:1}
    /* Chat */
    .chat-sidebar{width:380px;min-width:260px;max-width:600px;border-left:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;height:100%;flex-shrink:0}
    .resize-handle{width:5px;cursor:ew-resize;background:transparent;transition:background .15s;flex-shrink:0;position:relative;z-index:10}
    .resize-handle:hover,.resize-handle.dragging{background:rgba(99,102,241,.4)}
    .chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
    .chat-messages::-webkit-scrollbar{width:4px}
    .chat-messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
    /* Jarvis avatar */
    /* ── JARVIS Avatar ── */
    :root{
      --j-idle:7s; --j-idle2:11s; --j-idle3:5s; --j-idle4:15s;
      --j-hue:0deg;
      --j-glow-c:rgba(0,200,255,.55);
    }
    .jarvis-hq{position:relative;width:92px;height:92px;flex-shrink:0}
    .jarvis-hq svg{position:absolute;inset:0;width:100%;height:100%;
      filter:drop-shadow(0 0 7px var(--j-glow-c)) drop-shadow(0 0 20px rgba(0,200,255,.12));
      transition:filter .6s ease}
    /* Each ring gets independent easing for "organised chaos" */
    .jr1{transform-origin:50% 50%;animation:jrspin var(--j-idle)  cubic-bezier(.37,0,.63,1) infinite}
    .jr2{transform-origin:50% 50%;animation:jrspin var(--j-idle2) cubic-bezier(.45,.05,.55,.95) infinite reverse}
    .jr3{transform-origin:50% 50%;animation:jrspin var(--j-idle3) cubic-bezier(.76,0,.24,1) infinite}
    .jr-accent{transform-origin:50% 50%;animation:jrspin var(--j-idle4) linear infinite}
    .jdot1{transform-origin:50% 50%;animation:jrspin var(--j-idle)  linear infinite}
    .jdot2{transform-origin:50% 50%;animation:jrspin var(--j-idle2) linear infinite reverse}
    /* Core pulse — jitter effect */
    .jcore-glow{animation:jcore-pulse 1.8s cubic-bezier(.36,.07,.19,.97) infinite}
    @keyframes jrspin{to{transform:rotate(360deg)}}
    @keyframes jcore-pulse{
      0%,100%{opacity:.65}
      45%{opacity:1;transform:scale(1.2)}
      55%{opacity:.9;transform:scale(.95)}
    }
    /* Hue-rotate filter on active */
    .jarvis-hq.active svg{
      filter:drop-shadow(0 0 10px var(--j-glow-c)) drop-shadow(0 0 30px rgba(168,85,247,.3))
             hue-rotate(var(--j-hue));
    }
    /* Chat markdown */
    .doc-msg ul{margin:5px 0;padding:0;list-style:none}
    .doc-msg ul li{padding:2px 0 2px 18px;position:relative;font-size:12.5px;line-height:1.55;color:rgba(255,255,255,.8)}
    .doc-msg ul li::before{content:"";position:absolute;left:3px;top:9px;width:5px;height:5px;border-radius:50%;background:rgba(0,200,255,.9);box-shadow:0 0 5px rgba(0,200,255,.7)}
    .doc-msg strong{color:#fff;font-weight:600}
    .doc-msg p{margin:3px 0;font-size:12.5px;line-height:1.5;color:rgba(255,255,255,.8)}
    .doc-msg table{font-size:11.5px}
    @keyframes pulse-ring{0%{transform:scale(.9);opacity:.6}100%{transform:scale(1.3);opacity:0}}
    .chat-msg{padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.5;max-width:95%}
    /* ── Canvas Board ── */
    .canvas-panel{flex:0 0 50%;min-width:0;overflow-y:auto;border-right:1px solid rgba(0,200,255,.08);display:flex;flex-direction:column}
    .metrics-panel{flex:0 0 50%;min-width:0;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px}
    .canvas-header{padding:10px 16px;border-bottom:1px solid rgba(0,200,255,.08);display:flex;align-items:center;gap:8px;flex-shrink:0}
    .canvas-body{flex:1;padding:16px;position:relative;min-height:200px}
    /* Scanning animation */
    .scan-grid{position:absolute;inset:0;overflow:hidden;pointer-events:none}
    .scan-grid::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(0,200,255,.04) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(0,200,255,.04) 40px)}
    .scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(0,200,255,.6),transparent);animation:scan-move 2.5s linear infinite;top:0}
    @keyframes scan-move{0%{top:-2px;opacity:0}5%{opacity:1}95%{opacity:1}100%{top:100%;opacity:0}}
    .scan-corners::before,.scan-corners::after{content:"";position:absolute;width:16px;height:16px;border-color:rgba(0,200,255,.6);border-style:solid}
    .scan-corners::before{top:8px;left:8px;border-width:2px 0 0 2px}
    .scan-corners::after{bottom:8px;right:8px;border-width:0 2px 2px 0}
    /* Canvas content */
    .vis-content{opacity:0;transition:opacity .5s ease;position:relative;z-index:2}
    .vis-content.visible{opacity:1}
    .vis-card{background:rgba(0,200,255,.04);border:1px solid rgba(0,200,255,.12);border-radius:10px;padding:14px;margin-bottom:12px}
    .vis-card h4{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(0,200,255,.6);margin-bottom:8px;font-family:'JetBrains Mono',monospace}
    .vis-stat{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(0,200,255,.06);font-size:12px}
    .vis-stat:last-child{border:none}
    .vis-stat-val{color:rgba(0,200,255,.9);font-weight:600;font-family:'JetBrains Mono',monospace}
    .vis-bar-wrap{background:rgba(0,0,0,.3);border-radius:4px;height:6px;flex:1;margin:0 10px}
    .vis-bar{height:100%;border-radius:4px;background:linear-gradient(90deg,rgba(0,200,255,.7),rgba(99,102,241,.8));transition:width .8s cubic-bezier(.34,1.56,.64,1)}
    .action-card{background:rgba(0,200,255,.03);border-left:3px solid rgba(0,200,255,.5);border-radius:0 8px 8px 0;padding:10px 12px;margin-bottom:8px;font-size:12px;color:rgba(255,255,255,.75);line-height:1.5}
    .action-card strong{color:rgba(0,200,255,.9);display:block;margin-bottom:3px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
    /* Mermaid override */
    .mermaid{background:transparent!important}
    .mermaid svg{max-width:100%!important;background:transparent!important}
    .chat-user{background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.25);margin-left:auto}
    .chat-bot{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08)}
    .quick-q{padding:5px 12px;border-radius:8px;font-size:11px;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);cursor:pointer;background:transparent;transition:all .15s;white-space:nowrap}
    .quick-q:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.8)}
    @keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .animate-in{animation:countUp .5s ease forwards}
    @keyframes fadeChart{from{opacity:0}to{opacity:1}}
    .chart-fade{animation:fadeChart .8s ease forwards}
  </style>
</head>
<body style="height:100vh;overflow:hidden;display:flex;flex-direction:column">

<!-- Header -->
<header class="glass border-b border-white/8 px-5 py-3 flex items-center gap-4 flex-shrink-0">
  <a href="/" class="flex items-center gap-2 text-white/60 hover:text-white transition text-sm" style="text-decoration:none">
    <span>&#8592;</span> Mission Control
  </a>
  <div class="flex items-center gap-2">
    <span class="text-lg">&#x1F3C3;</span>
    <h1 class="text-sm font-semibold">Health Dashboard</h1>
  </div>
  <div class="flex-1"></div>
  <span class="text-xs text-white/20 mono" id="data-range"></span>
</header>

<!-- ══ MAIN WRAPPER ══ -->
<div style="display:flex;flex:1;overflow:hidden;min-height:0">

  <!-- ═══ LEFT: METRICS + CANVAS BOARD (scrollable) ═══ -->
  <div id="main-content" style="flex:1;overflow-y:auto;min-width:0;padding:14px 16px;display:flex;flex-direction:column;gap:12px">

    <!-- Hero Card -->
    <div class="glass-card" id="hero-card" style="padding:12px 16px">
      <div style="display:flex;align-items:center;gap:14px">
        <div style="width:50px;height:50px;border-radius:12px;background:rgba(99,102,241,.12);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0" id="hero-avatar">🏃</div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            <span style="font-size:15px;font-weight:700" id="athlete-level">--</span>
            <span style="font-size:10px;color:rgba(255,255,255,.3);font-family:monospace" id="level-tag"></span>
          </div>
          <div class="xp-bar" style="margin-bottom:8px"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px" id="stat-badges">
            <div class="stat-badge"><div class="stat-value accent" id="s-avg-steps">--</div><div class="stat-label">Avg Steps</div></div>
            <div class="stat-badge"><div class="stat-value emerald" id="s-best-day">--</div><div class="stat-label">Best Day</div></div>
            <div class="stat-badge"><div class="stat-value" style="color:#a78bfa" id="s-avg-sleep">--</div><div class="stat-label">Avg Sleep</div></div>
            <div class="stat-badge"><div class="stat-value" style="color:#f87171" id="s-avg-hr">--</div><div class="stat-label">Avg HR</div></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ─── Main Grid: Canvas (span 2 rows) + Charts ─── -->
    <div style="display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto auto auto;gap:12px;align-items:start">

      <!-- Canvas Board: left column, spans 2 rows -->
      <div class="glass-card" id="canvas-widget" style="grid-column:1;grid-row:1/span 2;padding:0;overflow:hidden;min-height:300px;border-color:rgba(0,200,255,.15)">
        <div style="padding:8px 12px;border-bottom:1px solid rgba(0,200,255,.08);display:flex;align-items:center;gap:8px">
          <svg width="12" height="12" viewBox="0 0 12 12"><circle cx="6" cy="6" r="5" fill="none" stroke="rgba(0,200,255,.6)" stroke-width="1.2"/><circle cx="6" cy="6" r="2" fill="rgba(0,200,255,.7)"/></svg>
          <span style="font-size:9px;font-weight:700;letter-spacing:.12em;color:rgba(0,200,255,.65);font-family:'JetBrains Mono',monospace">LIVE VISUALIZATION</span>
          <div style="flex:1"></div>
          <span style="font-size:8px;color:rgba(0,200,255,.3);font-family:'JetBrains Mono',monospace" id="canvas-topic">READY</span>
        </div>
        <div class="canvas-body" id="canvas-body" style="padding:12px;position:relative;min-height:260px">
          <div class="scan-grid" id="scan-overlay"><div class="scan-line" id="scan-line"></div></div>
          <div class="scan-corners"></div>
          <div class="vis-content" id="vis-content">
            <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:240px;gap:12px;opacity:.25">
              <svg width="40" height="40" viewBox="0 0 40 40"><circle cx="20" cy="20" r="18" fill="none" stroke="rgba(0,200,255,.8)" stroke-width="1.5" stroke-dasharray="5 3"/><circle cx="20" cy="20" r="4" fill="rgba(0,200,255,.6)"/></svg>
              <span style="font-size:10px;letter-spacing:.1em;color:rgba(0,200,255,.6);font-family:'JetBrains Mono',monospace">ASK DOC.AI</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Steps (right col, row 1) -->
      <div class="glass-card chart-fade" style="padding:10px;grid-column:2;grid-row:1">
        <h3 style="font-size:9px;font-weight:600;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">Steps (90d)</h3>
        <div style="position:relative;height:130px"><canvas id="chart-steps"></canvas></div>
      </div>

      <!-- Sleep (right col, row 2) -->
      <div class="glass-card chart-fade" style="padding:10px;grid-column:2;grid-row:2">
        <h3 style="font-size:9px;font-weight:600;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">Sleep</h3>
        <div style="position:relative;height:130px"><canvas id="chart-sleep"></canvas></div>
      </div>

      <!-- Weight (row 3, col 1) -->
      <div class="glass-card chart-fade" style="padding:10px;grid-column:1;grid-row:3">
        <h3 style="font-size:9px;font-weight:600;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">Weight</h3>
        <div style="position:relative;height:130px"><canvas id="chart-weight"></canvas></div>
      </div>

      <!-- HR (row 3, col 2) -->
      <div class="glass-card chart-fade" style="padding:10px;grid-column:2;grid-row:3">
        <h3 style="font-size:9px;font-weight:600;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">Heart Rate</h3>
        <div style="position:relative;height:130px"><canvas id="chart-hr"></canvas></div>
      </div>
    </div>

    <!-- Insights row -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="glass-card" style="padding:10px">
        <h3 style="font-size:9px;font-weight:600;color:rgba(52,211,153,.5);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">Positive</h3>
        <div id="insights-positive"></div>
      </div>
      <div class="glass-card" style="padding:10px">
        <h3 style="font-size:9px;font-weight:600;color:rgba(251,146,60,.5);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">Attention</h3>
        <div id="insights-negative"></div>
      </div>
    </div>

    <!-- Streak row -->
    <div class="glass-card" style="padding:10px">
      <div style="display:flex;align-items:center;gap:16px">
        <div style="text-align:center;min-width:48px"><div style="font-size:20px">🔥</div><div style="font-size:20px;font-weight:700" id="streak-current">0</div><div style="font-size:8px;color:rgba(255,255,255,.3)">NOW</div></div>
        <div style="text-align:center;min-width:48px"><div style="font-size:20px">🏆</div><div style="font-size:20px;font-weight:700" id="streak-best">0</div><div style="font-size:8px;color:rgba(255,255,255,.3)">BEST</div></div>
        <div style="flex:1"><div style="font-size:8px;color:rgba(255,255,255,.2);margin-bottom:4px;letter-spacing:.06em">LAST 60 DAYS</div><div id="heatmap" style="display:flex;flex-wrap:wrap;gap:2px"></div></div>
      </div>
    </div>

  </div><!-- /main-content -->

  <!-- ═══ RESIZE HANDLE ═══ -->
  <div class="resize-handle" id="resize-handle"></div>

  <!-- ═══ RIGHT: CHAT SIDEBAR ═══ -->
  <div class="chat-sidebar" id="chat-sidebar">
    <!-- JARVIS Header -->
    <div style="padding:10px 14px;border-bottom:1px solid rgba(0,200,255,.08);display:flex;align-items:center;gap:10px;flex-shrink:0">
      <div class="jarvis-hq" id="jarvis-hq">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" overflow="visible">
          <circle cx="50" cy="50" r="46" fill="none" stroke="rgba(0,200,255,.07)" stroke-width="8"/>
          <g class="jr1"><circle cx="50" cy="50" r="44" fill="none" stroke="rgba(0,200,255,.5)" stroke-width="1.2" stroke-dasharray="3 4 1 4 6 4 1 4 3 4 12 4"/></g>
          <g class="jr2"><circle cx="50" cy="50" r="37" fill="none" stroke="rgba(0,200,255,.35)" stroke-width="1" stroke-dasharray="8 3 2 3 14 3 2 3"/></g>
          <g class="jr-accent">
            <path d="M50 14 A36 36 0 0 1 86 50" stroke="rgba(255,180,0,.75)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            <circle cx="50" cy="14" r="2.5" fill="rgba(255,180,0,.9)"/>
          </g>
          <g class="jr3"><circle cx="50" cy="50" r="28" fill="none" stroke="rgba(0,200,255,.25)" stroke-width="1" stroke-dasharray="5 2 2 2 10 2"/></g>
          <circle cx="50" cy="50" r="20" fill="rgba(0,200,255,.04)" stroke="rgba(0,200,255,.3)" stroke-width="1"/>
          <g class="jdot1"><circle cx="50" cy="30" r="2.5" fill="rgba(0,200,255,1)"/></g>
          <g class="jdot2"><circle cx="50" cy="70" r="1.8" fill="rgba(255,180,0,.85)"/></g>
          <circle cx="50" cy="50" r="9" fill="rgba(0,200,255,.15)" stroke="rgba(0,200,255,.5)" stroke-width="1"/>
          <circle cx="50" cy="50" r="5" fill="rgba(0,200,255,.6)" class="jcore-glow"/>
          <circle cx="50" cy="50" r="2" fill="rgba(255,255,255,.9)"/>
        </svg>
      </div>
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:.12em;color:rgba(0,200,255,.9);text-shadow:0 0 8px rgba(0,200,255,.5);font-family:'JetBrains Mono',monospace">DOC.AI</div>
        <div style="font-size:9px;color:rgba(0,200,255,.4);letter-spacing:.06em" id="doc-status">● ONLINE</div>
      </div>
    </div>
    <!-- Messages -->
    <div class="chat-messages" id="chat-messages"></div>
    <!-- Quick + Input -->
    <div style="padding:8px 10px;border-top:1px solid rgba(0,200,255,.07);flex-shrink:0">
      <div style="display:flex;gap:6px;margin-bottom:7px;overflow-x:auto;padding-bottom:2px">
        <button class="quick-q" onclick="quickQ('Как мой сон?')">💤 Сон</button>
        <button class="quick-q" onclick="quickQ('Анализ веса и BMI')">⚖️ Вес</button>
        <button class="quick-q" onclick="quickQ('Рекомендации по активности на неделю')">🏃 План</button>
        <button class="quick-q" onclick="quickQ('Анализ пульса и рисков')">❤️ Пульс</button>
      </div>
      <div style="background:rgba(255,255,255,.03);border:1px solid rgba(0,200,255,.1);border-radius:10px;display:flex;align-items:center;gap:8px;padding:8px 10px">
        <input id="chat-input" type="text" placeholder="Спроси Doc..." style="flex:1;background:transparent;border:none;outline:none;font-size:12px;color:rgba(255,255,255,.85);font-family:inherit" onkeydown="if(event.key==='Enter')sendChat()"/>
        <button onclick="sendChat()" style="width:26px;height:26px;border-radius:7px;background:rgba(0,200,255,.2);border:1px solid rgba(0,200,255,.3);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s" onmouseover="this.style.background='rgba(0,200,255,.35)'" onmouseout="this.style.background='rgba(0,200,255,.2)'">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="rgba(0,200,255,.9)" width="12" height="12"><path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z"/></svg>
        </button>
      </div>
    </div>
  </div><!-- /chat-sidebar -->

</div><!-- /main-wrapper -->

<script src="/js/health.js"></script>
</body>
</html>
