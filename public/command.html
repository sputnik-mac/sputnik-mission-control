<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>🛰️ Command Center</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#03040a;color:#e0e8ff;font-family:'Inter',system-ui,sans-serif;overflow:hidden;height:100vh;width:100vw}

  /* Layout */
  #root{display:flex;height:100vh;width:100vw;flex-direction:column}
  #topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:rgba(6,10,28,.95);border-bottom:1px solid rgba(99,102,241,.2);flex-shrink:0;z-index:10;gap:16px}
  #main{display:flex;flex:1;overflow:hidden}
  #canvas-wrap{flex:1;position:relative;overflow:hidden}
  #orbit-canvas{width:100%;height:100%;display:block}
  #right-panel{width:310px;display:flex;flex-direction:column;background:rgba(4,6,20,.92);border-left:1px solid rgba(99,102,241,.12);flex-shrink:0}

  /* Topbar */
  .logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
  .logo-icon{font-size:20px}
  .logo-title{font-size:13px;font-weight:600;letter-spacing:.06em;color:rgba(255,255,255,.9)}
  .logo-sub{font-size:10px;color:rgba(255,255,255,.6);font-family:'JetBrains Mono',monospace;margin-top:1px}
  .sys-badges{display:flex;gap:12px;align-items:center;flex-shrink:0}
  .badge{display:flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,.65)}
  .badge-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
  .badge-dot.on{background:#10b981;box-shadow:0 0 5px #10b981}
  .badge-dot.off{background:#ef4444}
  .top-nav{display:flex;gap:6px;flex-shrink:0}
  .nav-btn{padding:5px 12px;border-radius:16px;font-size:11px;font-weight:500;border:1px solid rgba(99,102,241,.25);color:rgba(255,255,255,.45);cursor:pointer;text-decoration:none;transition:all .2s}
  .nav-btn:hover,.nav-btn.active{background:rgba(99,102,241,.18);color:white;border-color:rgba(99,102,241,.5)}

  /* Agent tooltip */
  #agent-tooltip{position:absolute;background:rgba(4,6,20,.97);border:1px solid rgba(99,102,241,.35);border-radius:12px;padding:12px 16px;pointer-events:none;display:none;z-index:20;min-width:200px;backdrop-filter:blur(12px)}
  .tt-name{font-size:13px;font-weight:600;color:white;margin-bottom:3px}
  .tt-status{font-size:11px;color:rgba(255,255,255,.4);margin-bottom:6px}
  .tt-task{font-size:11px;color:#a5b4fc;font-family:'JetBrains Mono',monospace;line-height:1.5;word-break:break-word}
  .tt-last{font-size:10px;color:rgba(255,255,255,.25);margin-top:6px}

  /* Right panel */
  #panel-header{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  #panel-title{font-size:10px;font-weight:600;letter-spacing:.1em;color:rgba(255,255,255,.5);text-transform:uppercase}
  #live-dot{width:6px;height:6px;border-radius:50%;background:#ef4444;display:inline-block;margin-right:4px;transition:background .3s}
  #live-dot.on{background:#10b981;animation:livePulse 2s infinite}
  #live-label{font-size:10px;color:rgba(255,255,255,.6);font-family:'JetBrains Mono',monospace}
  @keyframes livePulse{0%,100%{opacity:1;box-shadow:0 0 4px #10b981}50%{opacity:.4;box-shadow:none}}

  #activity-log{flex:1;overflow-y:auto;padding:6px}
  #activity-log::-webkit-scrollbar{width:2px}
  #activity-log::-webkit-scrollbar-thumb{background:rgba(99,102,241,.25);border-radius:2px}

  .log-entry{padding:8px 10px;border-radius:8px;margin-bottom:3px;border-left:2px solid transparent;animation:fadeIn .3s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
  .log-entry:hover{background:rgba(255,255,255,.02)}

  .log-entry.user { border-left-color:rgba(99,102,241,.5) }
  .log-entry.assistant { border-left-color:rgba(16,185,129,.4) }
  .log-entry.thinking { border-left-color:#f59e0b }
  .log-entry.idle { border-left-color:rgba(255,255,255,.08) }
  .log-entry.system { border-left-color:rgba(255,255,255,.15);background:rgba(255,255,255,.02) }
  .log-entry.tool { border-left-color:rgba(99,102,241,.3);background:rgba(99,102,241,.03); }

  .log-header{display:flex;align-items:center;gap:6px;margin-bottom:3px}
  .log-time{font-size:10px;color:rgba(255,255,255,.45);font-family:'JetBrains Mono',monospace;flex-shrink:0}
  .log-who{font-size:11px;font-weight:500}
  .log-who.user-who{color:rgba(200,210,255,.95)}
  .log-who.bot-who{color:rgba(110,231,183,.95)}
  .log-who.sys-who{color:rgba(255,255,255,.55)}
  .log-badge{padding:1px 5px;border-radius:3px;font-size:9px;font-weight:600;text-transform:uppercase;margin-left:2px}
  .lb-user{background:rgba(99,102,241,.2);color:#a5b4fc}
  .lb-assistant{background:rgba(16,185,129,.2);color:#34d399}
  .lb-thinking{background:rgba(245,158,11,.2);color:#fbbf24}
  .lb-system{background:rgba(255,255,255,.1);color:rgba(255,255,255,.55)}

  .log-msg{font-size:11px;color:rgba(255,255,255,.82);line-height:1.45;word-break:break-word}

  /* Stats footer */
  #stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(99,102,241,.08);border-top:1px solid rgba(99,102,241,.12);flex-shrink:0}
  .stat-cell{padding:9px 10px;background:#03040a;text-align:center}
  .stat-val{font-size:15px;font-weight:600;color:white;line-height:1;font-family:'JetBrains Mono',monospace}
  .stat-lbl{font-size:9px;color:rgba(255,255,255,.5);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
  .stat-active .stat-val{color:#f59e0b}

  /* Canvas overlays */
  #ticker{position:absolute;bottom:12px;left:12px;font-size:10px;color:rgba(255,255,255,.55);font-family:'JetBrains Mono',monospace;pointer-events:none;line-height:1.8}
</style>
</head>
<body>
<div id="root">

  <div id="topbar">
    <div class="logo">
      <span class="logo-icon">🛰️</span>
      <div>
        <div class="logo-title">COMMAND CENTER</div>
        <div class="logo-sub"><span id="live-dot"></span><span id="conn-status">connecting...</span></div>
      </div>
    </div>
    <div class="top-nav">
      <a href="/" class="nav-btn">← Dashboard</a>
      <a href="/command.html" class="nav-btn active">⚡ Command</a>
    </div>
    <div class="sys-badges">
      <div class="badge"><span class="badge-dot" id="bd-gw"></span>Gateway</div>
      <div class="badge"><span class="badge-dot" id="bd-ol"></span>Ollama</div>
      <div class="badge" id="mem-badge" style="color:rgba(99,102,241,.7)">— mem</div>
    </div>
  </div>

  <div id="main">
    <div id="canvas-wrap">
      <canvas id="orbit-canvas"></canvas>
      <div id="ticker"></div>
      <div id="agent-tooltip">
        <div class="tt-name" id="tt-name">—</div>
        <div class="tt-status" id="tt-status">—</div>
        <div class="tt-task" id="tt-task"></div>
        <div class="tt-last" id="tt-last"></div>
      </div>
    </div>

    <div id="right-panel">
      <div id="panel-header">
        <span id="panel-title">Activity Log</span>
        <div style="display:flex;align-items:center">
          <span id="live-dot" style="width:6px;height:6px;border-radius:50%;background:#ef4444;display:inline-block;margin-right:5px"></span>
          <span id="live-label">offline</span>
        </div>
      </div>
      <div id="activity-log">
        <div style="padding:20px 10px;text-align:center;color:rgba(255,255,255,.2);font-size:11px">
          Подключаюсь к потоку событий...
        </div>
      </div>
    </div>
  </div>

  <div id="stats-bar">
    <div class="stat-cell"><div class="stat-val" id="sv-agents">—</div><div class="stat-lbl">Agents</div></div>
    <div class="stat-cell" id="sc-active"><div class="stat-val" id="sv-active">0</div><div class="stat-lbl">Active</div></div>
    <div class="stat-cell"><div class="stat-val" id="sv-events">0</div><div class="stat-lbl">Events</div></div>
    <div class="stat-cell"><div class="stat-val" id="sv-uptime">—</div><div class="stat-lbl">Uptime</div></div>
  </div>

  <!-- Session history popup -->
  <div id="agent-popup" style="display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.7);backdrop-filter:blur(4px)" onclick="closeAgentPopup(event)">
    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:480px;max-height:70vh;background:#080c1e;border:1px solid rgba(99,102,241,.3);border-radius:16px;display:flex;flex-direction:column;overflow:hidden">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.06)">
        <div id="popup-title" style="font-size:14px;font-weight:600;color:white"></div>
        <button onclick="closeAgentPopup()" style="color:rgba(255,255,255,.3);background:none;border:none;font-size:18px;cursor:pointer;line-height:1">×</button>
      </div>
      <div id="popup-msgs" style="flex:1;overflow-y:auto;padding:12px;space-y:8px;font-size:12px">
        <div style="text-align:center;color:rgba(255,255,255,.25);padding:20px">Загружаю...</div>
      </div>
      <div style="padding:10px 14px;border-top:1px solid rgba(255,255,255,.06)">
        <div style="display:flex;gap:8px;align-items:center">
          <textarea id="popup-input" rows="1" placeholder="Напиши агенту..."
            style="flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(99,102,241,.2);border-radius:10px;padding:8px 12px;color:white;font-size:12px;resize:none;outline:none;font-family:inherit;line-height:1.4"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendToAgent()}"
            oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,80)+'px'"></textarea>
          <button onclick="sendToAgent()" id="popup-send-btn"
            style="width:34px;height:34px;border-radius:10px;background:#6366f1;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s"
            onmouseover="this.style.background='#818cf8'" onmouseout="this.style.background='#6366f1'">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z"/></svg>
          </button>
        </div>
        <div style="margin-top:6px"><a id="popup-open-chat" href="#" style="font-size:10px;color:rgba(99,102,241,.5);text-decoration:none">↗ Открыть полный чат</a></div>
      </div>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const STATUS_COLOR = {
  thinking: { core:"#f59e0b", glow:"rgba(245,158,11,", ring:"#fbbf24", label:"thinking..." },
  idle:     { core:"#6366f1", glow:"rgba(99,102,241,",  ring:"#818cf8", label:"idle" },
  recent:   { core:"#10b981", glow:"rgba(16,185,129,",  ring:"#34d399", label:"active" },
  offline:  { core:"#1f2937", glow:"rgba(31,41,55,",    ring:"#374151", label:"offline" },
  error:    { core:"#ef4444", glow:"rgba(239,68,68,",   ring:"#f87171", label:"error" },
};

// ─── STATE ────────────────────────────────────────────────────────────────────
let agents = [];
let stars = [];
let particles = [];
let eventCount = 0;
let frame = 0;
const orbits = {};   // id → { angle, speed }
const agentPos = {}; // id → { x, y } (updated each frame for tooltip hit test)
let pos = {};        // current agent positions (updated each render frame, used by SSE handlers)
const tickerLines = []; // bottom-left ticker

// ─── COSMIC STATE ────────────────────────────────────────────────────────────
let globalWarpTarget = 0;   // 0=idle, 1=warp (lerps based on thinking agents)
let globalWarpCurrent = 0;

// Nebula blobs (slowly drifting)
const nebulae = [
  { x: 0.25, y: 0.3, r: 0.35, color: [88, 28, 135], dx: 0.00008, dy: 0.00005 },
  { x: 0.7,  y: 0.6, r: 0.3,  color: [30, 58, 138], dx: -0.00006, dy: 0.00007 },
  { x: 0.5,  y: 0.8, r: 0.25, color: [55, 48, 163], dx: 0.00005, dy: -0.00009 },
];

// Neural web connection state
const neuralWeb = {};  // "id1:id2" → { pulseProgress, sparkTimer, lastActivity }

// Per-agent planet state
const planetState = {}; // id → { flareTimer, flareFrame, flareAngle, pulseRadius, pulseAlpha }

// ─── ORBIT TRAILS ─────────────────────────────────────────────────────────────
const orbitTrails = {}; // agentId → [{x,y}]

// ─── SHOOTING MESSAGES ────────────────────────────────────────────────────────
const shootingMessages = [];

function spawnShootingMessage(agentId, role) {
  const p = pos[agentId];
  const CX = cx(), CY = cy();
  if (!p) return;
  const isToAgent = (role === "user");
  const sx = isToAgent ? CX : p.x, sy = isToAgent ? CY : p.y;
  const tx = isToAgent ? p.x : CX,  ty = isToAgent ? p.y : CY;
  const color = role === "user" ? [96,165,250] : role === "tool" ? [251,191,36] : [52,211,153];
  shootingMessages.push({ sx, sy, tx, ty, x: sx, y: sy, progress: 0, speed: 0.025, color, trail: [] });
}

// ─── ASTEROIDS ────────────────────────────────────────────────────────────────
const asteroids = [];
let asteroidTimer = 0;
const ASTEROID_INTERVAL = 180; // frames between spawns (~3s at 60fps)

function spawnAsteroid() {
  const W = canvas.width, H = canvas.height;
  // Random edge: 0=top, 1=right, 2=bottom, 3=left
  const edge = Math.floor(Math.random() * 4);
  let x, y, vx, vy;
  const spd = 1.5 + Math.random() * 2.5;
  const angle = (Math.random() - 0.5) * 0.8; // slight curve from straight
  if (edge === 0)      { x = Math.random()*W; y = -20; vx = Math.cos(Math.PI/2+angle)*spd; vy = Math.sin(Math.PI/2+angle)*spd; }
  else if (edge === 1) { x = W+20; y = Math.random()*H; vx = -Math.cos(angle)*spd; vy = Math.sin(angle)*spd; }
  else if (edge === 2) { x = Math.random()*W; y = H+20; vx = Math.cos(-Math.PI/2+angle)*spd; vy = Math.sin(-Math.PI/2+angle)*spd; }
  else                 { x = -20; y = Math.random()*H; vx = Math.cos(angle)*spd; vy = Math.sin(angle)*spd; }

  const size = 3 + Math.random() * 7;
  const rot = Math.random() * Math.PI * 2;
  const rotSpeed = (Math.random() - 0.5) * 0.06;
  // Random jagged shape — 6-9 vertices
  const verts = 6 + Math.floor(Math.random() * 4);
  const shape = Array.from({length: verts}, (_, i) => {
    const a = (i / verts) * Math.PI * 2;
    const r = size * (0.6 + Math.random() * 0.4);
    return [Math.cos(a)*r, Math.sin(a)*r];
  });
  // Random color: grey, brown, or slightly blue-ish
  const hues = ['rgba(180,170,160', 'rgba(160,140,120', 'rgba(140,150,170', 'rgba(200,195,185'];
  const color = hues[Math.floor(Math.random()*hues.length)];
  asteroids.push({ x, y, vx, vy, rot, rotSpeed, shape, color, trail: [] });
}

function updateAndDrawAsteroids() {
  asteroidTimer++;
  // Random spawn: base interval + random delay
  if (asteroidTimer > ASTEROID_INTERVAL + Math.random() * 120) {
    spawnAsteroid();
    if (Math.random() < 0.3) spawnAsteroid(); // occasionally double spawn
    asteroidTimer = 0;
  }

  const W = canvas.width, H = canvas.height;
  for (let i = asteroids.length - 1; i >= 0; i--) {
    const a = asteroids[i];
    a.x += a.vx; a.y += a.vy; a.rot += a.rotSpeed;

    // Trail
    a.trail.push({x: a.x, y: a.y, age: 0});
    if (a.trail.length > 8) a.trail.shift();
    for (const t of a.trail) t.age++;

    // Remove if out of bounds
    if (a.x < -100 || a.x > W+100 || a.y < -100 || a.y > H+100) {
      asteroids.splice(i, 1); continue;
    }

    // Draw trail
    for (let j = 0; j < a.trail.length; j++) {
      const tp = a.trail[j];
      const alpha = (j / a.trail.length) * 0.25;
      ctx.beginPath(); ctx.arc(tp.x, tp.y, 1.5, 0, Math.PI*2);
      ctx.fillStyle = `rgba(200,190,170,${alpha})`; ctx.fill();
    }

    // Draw asteroid body
    ctx.save();
    ctx.translate(a.x, a.y);
    ctx.rotate(a.rot);
    ctx.beginPath();
    ctx.moveTo(a.shape[0][0], a.shape[0][1]);
    for (let v = 1; v < a.shape.length; v++) ctx.lineTo(a.shape[v][0], a.shape[v][1]);
    ctx.closePath();
    ctx.fillStyle = `${a.color},0.85)`;
    ctx.strokeStyle = `${a.color},0.4)`;
    ctx.lineWidth = 0.8; ctx.fill(); ctx.stroke();
    // Highlight edge
    ctx.beginPath();
    ctx.moveTo(a.shape[0][0]*0.5, a.shape[0][1]*0.5);
    for (let v = 1; v < 3; v++) ctx.lineTo(a.shape[v][0]*0.7, a.shape[v][1]*0.7);
    ctx.strokeStyle = `rgba(255,255,255,0.15)`; ctx.lineWidth = 0.6; ctx.stroke();
    ctx.restore();
  }
}

// ─── SPUTNIK HUB WOBBLE ───────────────────────────────────────────────────────
let hubWobble = { angle: 0, radius: 0, targetR: 0, dx: 0, dy: 0 };
let hubWobbleTimer = 0;

function updateHubWobble() {
  hubWobbleTimer++;
  // Every 3-6 seconds drift to new spot
  if (hubWobbleTimer > 180 + Math.floor(Math.random() * 180)) {
    hubWobble.targetR = 8 + Math.random() * 14;
    hubWobble.angle = Math.random() * Math.PI * 2;
    hubWobbleTimer = 0;
  }
  // Smoothly lerp offset
  const targetDx = Math.cos(hubWobble.angle) * hubWobble.targetR;
  const targetDy = Math.sin(hubWobble.angle) * hubWobble.targetR;
  hubWobble.dx = lerp(hubWobble.dx, targetDx, 0.012);
  hubWobble.dy = lerp(hubWobble.dy, targetDy, 0.012);
  // Small continuous breathing
  const breathe = Math.sin(frame * 0.018) * 3;
  return { dx: hubWobble.dx + Math.cos(frame*0.013)*breathe, dy: hubWobble.dy + Math.sin(frame*0.017)*breathe };
}

// Center hub rotation
const hubRings = [
  { angle: 0, tilt: 0.3, speed: 0.003 },
  { angle: Math.PI * 0.66, tilt: 0.5, speed: -0.005 },
  { angle: Math.PI * 1.33, tilt: 0.7, speed: 0.004 },
];

// ─── CANVAS ───────────────────────────────────────────────────────────────────
const canvas = document.getElementById("orbit-canvas");
const ctx = canvas.getContext("2d");
const wrap = document.getElementById("canvas-wrap");

function resize() {
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  if (!stars.length) initStars();
}
window.addEventListener("resize", resize);
resize();

function initStars() {
  stars = Array.from({length:150}, () => {
    const x = Math.random() * canvas.width;
    const y = Math.random() * canvas.height;
    const dx = canvas.width/2 - x;
    const dy = canvas.height/2 - y;
    const dist = Math.hypot(dx, dy) || 1;
    return {
      x, y,
      r: Math.random() * 1.3,
      phase: Math.random() * Math.PI * 2,
      speed: 0.003 + Math.random() * 0.005,
      vx: (dx / dist) * (0.3 + Math.random() * 0.7),  // toward center
      vy: (dy / dist) * (0.3 + Math.random() * 0.7),
      warpProgress: 0,
    };
  });
}

// ─── ORBIT RADII — each agent gets its own distance ───────────────────────────
const ORBIT_RADII = {
  "main":    75,   // Sputnik orbits close to Earth like a moon 🛰️
  "pioneer": 155,  // active coder
  "finance": 215,  // mid orbit
  "health":  275,  // outer orbit
};
function getOrbitRadius(agentId, index) {
  if (ORBIT_RADII[agentId] !== undefined) return ORBIT_RADII[agentId];
  return 140 + index * 65; // fallback for unknown agents
}

// ─── ORBIT INIT ───────────────────────────────────────────────────────────────
function initOrbits(agents) {
  agents.forEach((a, i) => {
    if (!orbits[a.id]) {
      orbits[a.id] = {
        angle: (i / agents.length) * Math.PI * 2,
        baseSpeed: a.id === "main" ? 0.012 : (0.006 - i * 0.0008), // Sputnik fast, others slower
        radius: getOrbitRadius(a.id, i),
      };
    }
  });
}

// ─── PARTICLES ────────────────────────────────────────────────────────────────
function spawnParticles(x, y, tx, ty, color, n = 6) {
  for (let i = 0; i < n; i++) {
    particles.push({
      x, y, tx, ty,
      progress: 0,
      speed: 0.015 + Math.random() * 0.025,
      alpha: 1,
      size: 1.5 + Math.random() * 2,
      color,
    });
  }
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function lerp(a, b, t) { return a + (b-a)*t; }
const cx = () => canvas.width  / 2;
const cy = () => canvas.height / 2 - 15;

// ─── DRAW AGENT ───────────────────────────────────────────────────────────────
function drawAgent(x, y, agent, size) {
  const col = STATUS_COLOR[agent.status] || STATUS_COLOR.idle;
  const t = frame;
  const pulse = 0.5 + 0.5 * Math.sin(t * 0.06 + agent.id.length);

  agentPos[agent.id] = { x, y, size };

  // Init planet state
  if (!planetState[agent.id]) planetState[agent.id] = {
    flareTimer: 60 + Math.random() * 60,
    flareFrame: -1, flareAngle: 0, flareLife: 0,
    pulseRadius: 0, pulseAlpha: 0,
  };
  const ps = planetState[agent.id];

  // ── ATMOSPHERE GLOW (3 concentric halos) ──
  const atmoLayers = [
    { mult: 2.2, alpha: 0.03 },
    { mult: 1.8, alpha: 0.06 },
    { mult: 1.4, alpha: 0.12 },
  ];
  for (const al of atmoLayers) {
    const ar = size * al.mult;
    const ag = ctx.createRadialGradient(x, y, size * 0.8, x, y, ar);
    ag.addColorStop(0, col.glow + (al.alpha + (agent.status === "thinking" ? 0.06 : 0)) + ")");
    ag.addColorStop(1, col.glow + "0)");
    ctx.beginPath(); ctx.arc(x, y, ar, 0, Math.PI*2); ctx.fillStyle = ag; ctx.fill();
  }

  // Thinking: spinning arc + bigger glow
  if (agent.status === "thinking") {
    const spin = t * 0.04;
    ctx.beginPath();
    ctx.arc(x, y, size + 12, spin, spin + Math.PI * 1.6);
    ctx.strokeStyle = col.ring;
    ctx.lineWidth = 2.5;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(x, y, size + 18, spin + Math.PI, spin + Math.PI * 1.4);
    ctx.strokeStyle = col.glow + "0.4)";
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // Body
  ctx.beginPath(); ctx.arc(x, y, size, 0, Math.PI*2);
  ctx.fillStyle = col.core; ctx.fill();

  // Surface texture — dark continent ellipses
  ctx.save();
  ctx.beginPath(); ctx.arc(x, y, size, 0, Math.PI*2); ctx.clip();
  const continents = [
    { ox: -0.3, oy: -0.2, w: 0.4, h: 0.25 },
    { ox: 0.2, oy: 0.25, w: 0.35, h: 0.2 },
    { ox: -0.1, oy: 0.4, w: 0.25, h: 0.15 },
  ];
  for (const c of continents) {
    ctx.beginPath();
    ctx.ellipse(x + c.ox * size, y + c.oy * size, c.w * size, c.h * size, 0.3, 0, Math.PI*2);
    ctx.fillStyle = "rgba(0,0,0,.15)"; ctx.fill();
  }
  ctx.restore();

  // Shine
  ctx.beginPath(); ctx.arc(x - size*.28, y - size*.28, size*.38, 0, Math.PI*2);
  ctx.fillStyle = "rgba(255,255,255,.12)"; ctx.fill();

  // ── PLANET RING (tilted ellipse) ──
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(15 * Math.PI / 180);
  ctx.beginPath();
  ctx.ellipse(0, 0, size * 1.8, size * 0.3, 0, 0, Math.PI*2);
  ctx.strokeStyle = agent.status === "thinking"
    ? col.glow + "0.5)" : col.glow + "0.2)";
  ctx.lineWidth = 1.2;
  ctx.stroke();
  ctx.restore();

  // ── SOLAR FLARE (when thinking) ──
  if (agent.status === "thinking") {
    ps.flareTimer--;
    if (ps.flareTimer <= 0) {
      ps.flareTimer = 60 + Math.random() * 60;
      ps.flareFrame = 0;
      ps.flareAngle = Math.random() * Math.PI * 2;
      ps.flareLife = 30;
    }
    if (ps.flareFrame >= 0 && ps.flareFrame < ps.flareLife) {
      const progress = ps.flareFrame / ps.flareLife;
      const fa = ps.flareAngle;
      const fx = x + Math.cos(fa) * size;
      const fy = y + Math.sin(fa) * size;
      const tipDist = size * (1.2 + 1.5 * Math.sin(progress * Math.PI));
      const tx = x + Math.cos(fa) * tipDist;
      const ty = y + Math.sin(fa) * tipDist;
      const cpx = x + Math.cos(fa + 0.4) * tipDist * 0.9;
      const cpy = y + Math.sin(fa + 0.4) * tipDist * 0.9;
      const flareAlpha = (1 - progress) * 0.8;
      ctx.beginPath();
      ctx.moveTo(fx, fy);
      ctx.quadraticCurveTo(cpx, cpy, tx, ty);
      ctx.strokeStyle = `rgba(245,158,11,${flareAlpha})`;
      ctx.lineWidth = 2.5 * (1 - progress);
      ctx.stroke();
      ps.flareFrame++;
    }

    // ── PULSE RING (expanding ring when thinking) ──
    ps.pulseRadius += (size * 3 - ps.pulseRadius) * 0.03;
    ps.pulseAlpha = 0.6 * (1 - (ps.pulseRadius - size) / (size * 2));
    if (ps.pulseAlpha < 0.02) { ps.pulseRadius = size; ps.pulseAlpha = 0.6; }
    ctx.beginPath(); ctx.arc(x, y, ps.pulseRadius, 0, Math.PI*2);
    ctx.strokeStyle = col.glow + Math.max(0, ps.pulseAlpha) + ")";
    ctx.lineWidth = 1.5; ctx.stroke();
  } else {
    // Reset pulse when not thinking
    ps.pulseRadius = size;
    ps.pulseAlpha = 0;
    ps.flareFrame = -1;
  }

  // Icon
  ctx.font = `${Math.round(size * 1.05)}px serif`;
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText(agent.icon, x, y);

  // Name
  ctx.font = "500 11px Inter, system-ui";
  ctx.fillStyle = "rgba(255,255,255,.85)";
  ctx.fillText(agent.name, x, y + size + 14);

  // Status
  ctx.font = "10px 'JetBrains Mono', monospace";
  ctx.fillStyle = col.ring;
  const statusLabel = agent.status === "thinking" ? "● thinking" :
                      agent.status === "recent"   ? "● active"   :
                      agent.status === "offline"  ? "○ offline"  : "· idle";
  ctx.fillText(statusLabel, x, y + size + 27);

  // Last message preview (tiny, below status)
  if (agent.lastMsg && agent.status !== "offline") {
    const preview = (agent.lastMsg.content || "").slice(0, 28) + (agent.lastMsg.content?.length > 28 ? "…" : "");
    ctx.font = "9px Inter, system-ui";
    ctx.fillStyle = "rgba(255,255,255,.2)";
    ctx.fillText(preview, x, y + size + 40);
  }
}

// ─── RENDER LOOP ──────────────────────────────────────────────────────────────
function _renderCore() {
  frame++;
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // Dark background
  const bg = ctx.createRadialGradient(W/2,H/2,0, W/2,H/2,W*.65);
  bg.addColorStop(0, "#080c1e"); bg.addColorStop(1, "#03040a");
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);

  // Nebula background
  for (const n of nebulae) {
    n.x += n.dx; n.y += n.dy;
    if (n.x < 0.1 || n.x > 0.9) n.dx *= -1;
    if (n.y < 0.1 || n.y > 0.9) n.dy *= -1;
    const nx = n.x * W, ny = n.y * H, nr = n.r * Math.max(W, H);
    const ng = ctx.createRadialGradient(nx, ny, 0, nx, ny, nr);
    ng.addColorStop(0, `rgba(${n.color[0]},${n.color[1]},${n.color[2]},0.04)`);
    ng.addColorStop(0.5, `rgba(${n.color[0]},${n.color[1]},${n.color[2]},0.02)`);
    ng.addColorStop(1, `rgba(${n.color[0]},${n.color[1]},${n.color[2]},0)`);
    ctx.fillStyle = ng; ctx.fillRect(0, 0, W, H);
  }

  // Warp drive logic
  const thinkingCount = agents.filter(a => a.status === "thinking").length;
  globalWarpTarget = thinkingCount > 0 ? 1 : 0;
  globalWarpCurrent = lerp(globalWarpCurrent, globalWarpTarget, globalWarpTarget > 0 ? 0.03 : 0.01);

  // Stars with warp streaks
  for (const s of stars) {
    s.warpProgress = lerp(s.warpProgress, globalWarpCurrent, globalWarpTarget > 0 ? 0.04 : 0.008);
    const a = 0.2 + 0.5 * Math.sin(frame * s.speed + s.phase);

    if (s.warpProgress > 0.02) {
      // Warp streak
      const streakLen = s.warpProgress * 25;
      const endX = s.x + s.vx * streakLen;
      const endY = s.y + s.vy * streakLen;
      const sg = ctx.createLinearGradient(s.x, s.y, endX, endY);
      const blueShift = Math.min(1, s.warpProgress);
      sg.addColorStop(0, `rgba(${200 - blueShift*60},${215 - blueShift*20},255,${a * 0.3})`);
      sg.addColorStop(1, `rgba(160,200,255,${a * (0.5 + s.warpProgress * 0.5)})`);
      ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(endX, endY);
      ctx.strokeStyle = sg; ctx.lineWidth = s.r * (1 + s.warpProgress); ctx.stroke();
    }
    // Always draw the dot
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(200,215,255,${a})`; ctx.fill();
  }

  // Grid
  ctx.strokeStyle = "rgba(99,102,241,.03)"; ctx.lineWidth = 1;
  for (let x=0;x<W;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for (let y=0;y<H;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // Asteroids (drawn before agents, after stars)
  updateAndDrawAsteroids();

  const wobble = updateHubWobble();
  const CX = cx() + wobble.dx, CY = cy() + wobble.dy;

  // Draw Earth (Sergey) in center — big glowing planet
  const earthR = 42;
  // Outer atmosphere layers
  [[earthR*2.5, 0.03], [earthR*2.0, 0.05], [earthR*1.5, 0.08]].forEach(([r, a]) => {
    const eg = ctx.createRadialGradient(CX,CY,0,CX,CY,r);
    eg.addColorStop(0, `rgba(30,120,255,${a})`); eg.addColorStop(1, 'rgba(30,120,255,0)');
    ctx.beginPath(); ctx.arc(CX,CY,r,0,Math.PI*2); ctx.fillStyle=eg; ctx.fill();
  });
  // Planet body
  const earthG = ctx.createRadialGradient(CX-10,CY-10,2,CX,CY,earthR);
  earthG.addColorStop(0,'#4a9eff'); earthG.addColorStop(0.4,'#1a6fd4'); earthG.addColorStop(1,'#0a3d8f');
  ctx.beginPath(); ctx.arc(CX,CY,earthR,0,Math.PI*2); ctx.fillStyle=earthG; ctx.fill();
  // Continents — clip to planet circle
  ctx.save();
  ctx.beginPath(); ctx.arc(CX,CY,earthR,0,Math.PI*2); ctx.clip();
  ctx.fillStyle='rgba(34,140,34,0.65)';
  [[CX-12,CY-8,16,10],[CX+8,CY+5,12,8],[CX-5,CY+12,9,6]].forEach(([x,y,w,h])=>{
    ctx.beginPath(); ctx.ellipse(x,y,w,h,0.4,0,Math.PI*2); ctx.fill();
  });
  ctx.restore();
  // Outline glow
  ctx.beginPath(); ctx.arc(CX,CY,earthR,0,Math.PI*2);
  ctx.strokeStyle='rgba(74,158,255,0.5)'; ctx.lineWidth=1.5; ctx.stroke();
  // "You" label
  ctx.font='bold 10px Inter,system-ui'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.fillText('🌍', CX, CY);
  ctx.font='500 10px Inter,system-ui'; ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.fillText('Sergey', CX, CY + earthR + 13);

  // Draw orbit rings at individual radii
  const secondaries = agents.filter(a=>a.role!=="primary");
  secondaries.forEach((a, i) => {
    const r = orbits[a.id]?.radius ?? getOrbitRadius(a.id, i);
    ctx.beginPath(); ctx.arc(CX, CY, r, 0, Math.PI*2);
    ctx.strokeStyle = "rgba(99,102,241,.08)"; ctx.lineWidth = 1;
    ctx.setLineDash([4,12]); ctx.stroke(); ctx.setLineDash([]);
  });

  // Advance orbits — ALL agents including Sputnik
  for (const a of agents) {
    if (!orbits[a.id]) orbits[a.id] = { angle: Math.random()*Math.PI*2, baseSpeed: 0.005, radius: getOrbitRadius(a.id, 0) };
    const spd = a.status === "thinking" ? orbits[a.id].baseSpeed * 3.5 : orbits[a.id].baseSpeed;
    orbits[a.id].angle += spd;
  }

  // Compute positions — ALL agents orbit Earth (CX/CY), including Sputnik
  pos = {};
  for (const a of agents) {
    const o = orbits[a.id] || { angle: 0, radius: 185 };
    pos[a.id] = { x: CX + Math.cos(o.angle)*o.radius, y: CY + Math.sin(o.angle)*o.radius };
  }

  // Connection beams (thinking agents → hub)
  for (const a of secondaries) {
    if (a.status !== "thinking") continue;
    const p = pos[a.id], hub = pos["main"] || {x:CX,y:CY};
    const g = ctx.createLinearGradient(p.x,p.y,hub.x,hub.y);
    g.addColorStop(0,"rgba(245,158,11,.7)");
    g.addColorStop(1,"rgba(99,102,241,.3)");
    ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(hub.x,hub.y);
    ctx.strokeStyle=g; ctx.lineWidth=1.5; ctx.stroke();
  }

  // Neural web — connections between ALL agent pairs
  const allAgentIds = agents.map(a => a.id);
  for (let i = 0; i < allAgentIds.length; i++) {
    for (let j = i + 1; j < allAgentIds.length; j++) {
      const idA = allAgentIds[i], idB = allAgentIds[j];
      const pA = pos[idA], pB = pos[idB];
      if (!pA || !pB) continue;
      const key = idA + ":" + idB;
      if (!neuralWeb[key]) neuralWeb[key] = { pulseProgress: Math.random(), lastActivity: 0 };
      const nw = neuralWeb[key];

      const agA = agents.find(a => a.id === idA);
      const agB = agents.find(a => a.id === idB);
      const eitherThinking = agA?.status === "thinking" || agB?.status === "thinking";

      if (eitherThinking) nw.lastActivity = frame;
      const idleTime = frame - nw.lastActivity;
      const fadeAlpha = eitherThinking ? 0.6 : (idleTime > 600 ? 0.05 : 0.15);

      // Line
      if (eitherThinking) {
        ctx.strokeStyle = `rgba(139,92,246,${fadeAlpha})`;
        ctx.lineWidth = 1.2;
      } else {
        ctx.strokeStyle = `rgba(99,102,241,${fadeAlpha})`;
        ctx.lineWidth = 0.6;
      }
      ctx.beginPath(); ctx.moveTo(pA.x, pA.y); ctx.lineTo(pB.x, pB.y); ctx.stroke();

      // Pulse dot traveling along the line
      nw.pulseProgress = (nw.pulseProgress + (eitherThinking ? 0.012 : 0.005)) % 1;
      const px = lerp(pA.x, pB.x, nw.pulseProgress);
      const py = lerp(pA.y, pB.y, nw.pulseProgress);
      const pulseAlpha = eitherThinking ? 0.8 : 0.2;
      ctx.beginPath(); ctx.arc(px, py, eitherThinking ? 2.5 : 1.5, 0, Math.PI*2);
      ctx.fillStyle = `rgba(167,139,250,${pulseAlpha})`; ctx.fill();

      // Synaptic sparks when thinking
      if (eitherThinking && frame % 3 === 0) {
        for (let s = 0; s < 3; s++) {
          const t = Math.random();
          const sx = lerp(pA.x, pB.x, t) + (Math.random() - 0.5) * 12;
          const sy = lerp(pA.y, pB.y, t) + (Math.random() - 0.5) * 12;
          const sa = 0.3 + Math.random() * 0.5;
          ctx.beginPath(); ctx.arc(sx, sy, 0.8 + Math.random(), 0, Math.PI*2);
          ctx.fillStyle = `rgba(196,181,253,${sa})`; ctx.fill();
        }
      }
    }
  }

  // Particles
  particles = particles.filter(p => p.progress < 1);
  for (const p of particles) {
    p.progress += p.speed;
    p.x = lerp(p.x, p.tx, p.speed * 1.5);
    p.y = lerp(p.y, p.ty, p.speed * 1.5);
    p.alpha = 1 - p.progress;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fillStyle = `rgba(245,158,11,${p.alpha*.8})`; ctx.fill();
  }

  // ── Orbit trails (comet tails) ──
  for (const a of agents) {
    if (a.role === "primary") continue;
    const p = pos[a.id]; if (!p) continue;
    if (!orbitTrails[a.id]) orbitTrails[a.id] = [];
    orbitTrails[a.id].push({x: p.x, y: p.y});
    if (orbitTrails[a.id].length > 50) orbitTrails[a.id].shift();
    const trail = orbitTrails[a.id];
    if (trail.length > 1) {
      const col = STATUS_COLOR[a.status] || STATUS_COLOR.idle;
      for (let i = 1; i < trail.length; i++) {
        const t = i / trail.length;
        ctx.beginPath();
        ctx.moveTo(trail[i-1].x, trail[i-1].y);
        ctx.lineTo(trail[i].x, trail[i].y);
        ctx.strokeStyle = col.glow + (t * 0.35) + ")";
        ctx.lineWidth = t * 2.5;
        ctx.stroke();
      }
    }
  }

  // ── Shooting messages ──
  for (let i = shootingMessages.length - 1; i >= 0; i--) {
    const m = shootingMessages[i];
    m.progress = Math.min(1, m.progress + m.speed);
    m.x = lerp(m.sx, m.tx, m.progress);
    m.y = lerp(m.sy, m.ty, m.progress);
    m.trail.push({x: m.x, y: m.y});
    if (m.trail.length > 12) m.trail.shift();
    if (m.progress >= 1) { shootingMessages.splice(i, 1); continue; }
    // Trail
    for (let j = 1; j < m.trail.length; j++) {
      const a = (j / m.trail.length) * 0.55;
      ctx.beginPath(); ctx.moveTo(m.trail[j-1].x, m.trail[j-1].y); ctx.lineTo(m.trail[j].x, m.trail[j].y);
      ctx.strokeStyle = `rgba(${m.color},${a})`; ctx.lineWidth = 1.5; ctx.stroke();
    }
    // Head glow
    const [r,g,b] = m.color;
    const glow = ctx.createRadialGradient(m.x, m.y, 0, m.x, m.y, 10);
    glow.addColorStop(0, `rgba(${r},${g},${b},0.9)`); glow.addColorStop(1, `rgba(${r},${g},${b},0)`);
    ctx.beginPath(); ctx.arc(m.x, m.y, 10, 0, Math.PI*2); ctx.fillStyle = glow; ctx.fill();
    ctx.beginPath(); ctx.arc(m.x, m.y, 3, 0, Math.PI*2);
    ctx.fillStyle = `rgb(${r},${g},${b})`; ctx.fill();
  }

  // Draw agents (skip primary — drawn as Earth above)
  for (const a of agents) {
    if (a.role === "primary" && a.id === "__earth__") continue; // reserved
    const p = pos[a.id];
    drawAgent(p.x, p.y, a, a.id === "main" ? 20 : 26);

    // Particle bursts for active agents
    if (a.status === "thinking" && a.role !== "primary" && frame % 18 === 0) {
      const hub = pos["main"] || {x:CX,y:CY};
      spawnParticles(p.x, p.y, hub.x, hub.y, "#f59e0b", 5);
    }
    if (a.role === "primary" && a.status === "thinking" && frame % 12 === 0) {
      // Central hub pulses outward
      for (const sec of secondaries) {
        const sp = pos[sec.id];
        if (sp) spawnParticles(CX, CY, sp.x, sp.y, "#818cf8", 3);
      }
    }
  }

  // Center Sputnik rotating orbital rings
  for (const hr of hubRings) {
    hr.angle += hr.speed;
    ctx.save();
    ctx.translate(CX, CY);
    ctx.rotate(hr.angle);
    ctx.beginPath();
    ctx.ellipse(0, 0, 50, 50 * hr.tilt, 0, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(99,102,241,${0.08 + 0.04 * Math.sin(frame * 0.02 + hr.tilt * 5)})`;
    ctx.lineWidth = 0.8;
    ctx.stroke();
    ctx.restore();
  }

  // Center crosshair
  ctx.strokeStyle="rgba(99,102,241,.15)"; ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(CX-18,CY);ctx.lineTo(CX+18,CY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(CX,CY-18);ctx.lineTo(CX,CY+18);ctx.stroke();

  // Ticker
  const tickEl = document.getElementById("ticker");
  if (tickerLines.length) tickEl.innerHTML = tickerLines.slice(-3).join("<br>");

  requestAnimationFrame(render); // calls the night-mode wrapper
}

// ─── SSE ──────────────────────────────────────────────────────────────────────
let es;
function connectSSE() {
  es = new EventSource("/api/command/events");

  es.addEventListener("snapshot", e => {
    const data = JSON.parse(e.data);
    onSnapshot(data);
    setConnected(true);
  });

  es.addEventListener("agent_event", e => {
    const ev = JSON.parse(e.data);
    onAgentEvent(ev);
  });

  es.addEventListener("agent_update", e => {
    const { id, status, task } = JSON.parse(e.data);
    const a = agents.find(x => x.id === id);
    if (!a) return;
    a.status = status;
    a.task = task;
    updateFooter();
  });

  es.addEventListener("ping", () => setConnected(true));

  es.onerror = () => {
    setConnected(false);
    es.close();
    setTimeout(connectSSE, 3000);
  };
}

function setConnected(on) {
  // Update ALL live dots
  document.querySelectorAll("#live-dot").forEach(d => {
    d.style.background = on ? "#10b981" : "#ef4444";
    d.style.boxShadow  = on ? "0 0 6px #10b981" : "none";
    d.style.animation  = on ? "livePulse 2s infinite" : "none";
  });
  // Update topbar label
  const lbl = document.getElementById("conn-status");
  if (lbl) lbl.textContent = on ? "live" : "reconnecting...";
  // Update panel header label
  const lbl2 = document.getElementById("live-label");
  if (lbl2) lbl2.textContent = on ? "live" : "reconnecting...";
}

// ─── SNAPSHOT ────────────────────────────────────────────────────────────────
function onSnapshot(data) {
  agents = data;
  initOrbits(agents);
  updateFooter();
  document.getElementById("sv-agents").textContent = agents.length;
}

// ─── AGENT EVENT (real message) ───────────────────────────────────────────────
// Frontend noise filter — skip garbage that slips through
const SKIP_RE = [
  /^pong/i,
  /^ping/i,
  /^HEARTBEAT_OK/i,
  /^NO_REPLY$/i,
  /^Conversation info \(untrusted/i,
  /^Sender \(untrusted/i,
  /^Read HEARTBEAT/i,
];
function isNoise(text) {
  if (!text) return false;
  return SKIP_RE.some(r => r.test(text.trim()));
}

function onAgentEvent(ev) {
  const { id, name, icon, role, tool, toolIcon, text, desc } = ev;

  // Drop noise events entirely
  if (isNoise(text)) return;

  eventCount++;
  document.getElementById("sv-events").textContent = eventCount;

  // Update agent lastMsg
  const a = agents.find(x => x.id === id);
  if (a) {
    a.status = ev.status || a.status;
    if (role !== "tool") a.lastMsg = { role, content: text || desc || "" };
    updateFooter();
  }

  // Ticker (only for user/assistant, not every tool call)
  if (role !== "tool") {
    const short = (text || "").slice(0, 35) + ((text||"").length > 35 ? "…" : "");
    tickerLines.push(`${icon} ${role === "user" ? "▶" : "◀"} ${short}`);
    if (tickerLines.length > 5) tickerLines.shift();
  }

  addLog({ type: role, icon, name, text: text || null, tool: tool || null, toolIcon: toolIcon || null, desc: desc || null, ts: ev.ts || new Date().toISOString() });

  // Shooting star: fly from Earth → agent (user msg) or agent → Earth (reply)
  spawnShootingMessage(id, role);
}

// ─── ACTIVITY LOG ────────────────────────────────────────────────────────────
const MAX_LOG = 80;
function addLog({ type, icon, name, text, tool, toolIcon, desc, ts }) {
  const log = document.getElementById("activity-log");
  const placeholder = log.querySelector("[data-placeholder]");
  if (placeholder) placeholder.remove();

  const entry = document.createElement("div");
  const isTool = type === "tool";
  const cssType = isTool ? "tool" : type === "user" ? "user" : type === "assistant" ? "assistant" : "system";
  entry.className = `log-entry ${cssType}`;

  const time = new Date(ts).toLocaleTimeString("ru-RU", {hour:"2-digit",minute:"2-digit",second:"2-digit"});

  if (isTool) {
    // Tool call — compact one-liner
    entry.innerHTML = `
      <div class="log-header">
        <span class="log-time">${time}</span>
        <span class="log-who sys-who">${toolIcon || "🔧"} <span style="color:rgba(165,180,252,.6)">${tool}</span></span>
        <span class="log-badge" style="background:rgba(99,102,241,.15);color:rgba(165,180,252,.6);font-size:9px">TOOL</span>
      </div>
      ${desc ? `<div class="log-msg" style="color:rgba(255,255,255,.6);font-family:'JetBrains Mono',monospace;font-size:10px">${esc(desc)}</div>` : ""}`;
  } else {
    const whoClass = type === "user" ? "user-who" : type === "assistant" ? "bot-who" : "sys-who";
    const whoLabel = type === "user" ? "👤 Serhii" : type === "assistant" ? (icon + " " + name) : "⚙ system";
    const badgeClass = type === "user" ? "lb-user" : type === "assistant" ? "lb-assistant" : "lb-system";
    const badgeLabel = type === "user" ? "msg" : type === "assistant" ? "reply" : "sys";
    entry.innerHTML = `
      <div class="log-header">
        <span class="log-time">${time}</span>
        <span class="log-who ${whoClass}">${whoLabel}</span>
        <span class="log-badge ${badgeClass}">${badgeLabel}</span>
      </div>
      ${text ? `<div class="log-msg">${esc(text.slice(0,140))}${text.length>140?"…":""}</div>` : ""}`;
  }

  log.insertBefore(entry, log.firstChild);
  while (log.children.length > MAX_LOG) log.removeChild(log.lastChild);
}

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ─── FOOTER ───────────────────────────────────────────────────────────────────
function updateFooter() {
  const active = agents.filter(a => a.status === "thinking").length;
  document.getElementById("sv-active").textContent = active;
  document.getElementById("sc-active").className = "stat-cell" + (active > 0 ? " stat-active" : "");
}

// ─── TOOLTIP ──────────────────────────────────────────────────────────────────
canvas.addEventListener("mousemove", e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const tip = document.getElementById("agent-tooltip");
  let found = null;

  for (const [id, p] of Object.entries(agentPos)) {
    if (Math.hypot(mx - p.x, my - p.y) < p.size + 12) {
      found = agents.find(a => a.id === id);
      break;
    }
  }

  if (found) {
    const secAgo = found.secAgo || 0;
    const ago = secAgo < 60 ? `${secAgo}s ago` : secAgo < 3600 ? `${Math.round(secAgo/60)}m ago` : `${Math.round(secAgo/3600)}h ago`;
    document.getElementById("tt-name").textContent = found.icon + " " + found.name;
    document.getElementById("tt-status").textContent = `${found.status}  ·  last active: ${ago}`;
    document.getElementById("tt-task").textContent = found.lastMsg?.content?.slice(0,80) || found.task?.slice(0,80) || "";
    document.getElementById("tt-last").textContent = found.lastMsg ? `role: ${found.lastMsg.role}` : "";
    tip.style.display = "block";
    tip.style.left = (e.clientX - rect.left + 18) + "px";
    tip.style.top  = (e.clientY - rect.top  - 16) + "px";
    canvas.style.cursor = "pointer";
  } else {
    tip.style.display = "none";
    canvas.style.cursor = "default";
  }
});
canvas.addEventListener("mouseleave", () => {
  document.getElementById("agent-tooltip").style.display = "none";
});

canvas.addEventListener("click", e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  for (const [id, p] of Object.entries(agentPos)) {
    if (Math.hypot(mx - p.x, my - p.y) < p.size + 12) {
      openAgentPopup(id);
      break;
    }
  }
});

// ─── SYSTEM STATUS ────────────────────────────────────────────────────────────
async function loadSys() {
  try {
    const s = await fetch("/api/status").then(r=>r.json());
    setBadge("bd-gw", s.gateway);
    setBadge("bd-ol", s.ollama);
  } catch {}
  try {
    const m = await fetch("/api/memories").then(r=>r.json());
    document.getElementById("mem-badge").textContent = (m.count||0) + " mem";
    document.getElementById("sv-agents").textContent = agents.length || "—";
  } catch {}
  try {
    const s = await fetch("/api/stats/system").then(r=>r.json());
    document.getElementById("sv-uptime").textContent = s.uptimeHuman || "—";
  } catch {}
}
function setBadge(id, ok) {
  const el = document.getElementById(id);
  if (el) el.className = "badge-dot " + (ok ? "on" : "off");
}

// ─── AGENT POPUP ─────────────────────────────────────────────────────────────
let currentPopupAgentId = null;

async function sendToAgent() {
  const input = document.getElementById("popup-input");
  const text = input.value.trim();
  if (!text || !currentPopupAgentId) return;
  const btn = document.getElementById("popup-send-btn");
  btn.disabled = true; btn.style.opacity = "0.4";
  input.value = ""; input.style.height = "auto";
  // Optimistic: add user msg to popup
  const msgs = document.getElementById("popup-msgs");
  const el = document.createElement("div");
  el.style.cssText = "margin-bottom:8px;padding:8px 10px;border-radius:10px;background:rgba(99,102,241,.12);border-left:2px solid rgba(99,102,241,.5)";
  el.innerHTML = `<div style="font-size:9px;color:rgba(255,255,255,.25);margin-bottom:3px">👤 Serhii</div><div style="font-size:11px;color:rgba(255,255,255,.7)">${esc(text)}</div>`;
  msgs.appendChild(el); msgs.scrollTop = msgs.scrollHeight;
  // Send via chat API
  try {
    const r = await fetch("/api/chat", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ message: text, agentId: currentPopupAgentId }) });
    const { jobId } = await r.json();
    // Poll for response
    const replyEl = document.createElement("div");
    replyEl.style.cssText = "margin-bottom:8px;padding:8px 10px;border-radius:10px;background:rgba(255,255,255,.04);border-left:2px solid rgba(16,185,129,.3)";
    const agent = agents.find(a=>a.id===currentPopupAgentId);
    replyEl.innerHTML = `<div style="font-size:9px;color:rgba(255,255,255,.25);margin-bottom:3px">${agent?.icon||"🤖"} ${agent?.name||currentPopupAgentId}</div><div style="font-size:11px;color:rgba(255,255,255,.5);font-style:italic">печатает…</div>`;
    msgs.appendChild(replyEl); msgs.scrollTop = msgs.scrollHeight;
    for (let i = 0; i < 80; i++) {
      await new Promise(r=>setTimeout(r,1500));
      const d = await fetch(`/api/chat/${jobId}`).then(r=>r.json());
      if (d.status === "done") { replyEl.querySelector("div:last-child").innerHTML = esc(d.text||""); replyEl.querySelector("div:last-child").style.cssText="font-size:11px;color:rgba(255,255,255,.65);line-height:1.5;font-style:normal"; break; }
      if (d.status === "error") { replyEl.querySelector("div:last-child").textContent = "⚠️ " + d.error; break; }
    }
  } catch(e) { el.innerHTML += `<div style="color:red;font-size:10px">${e.message}</div>`; }
  btn.disabled = false; btn.style.opacity = "1";
}

async function openAgentPopup(agentId) {
  currentPopupAgentId = agentId;
  const agent = agents.find(a => a.id === agentId);
  if (!agent) return;
  const popup = document.getElementById("agent-popup");
  const title = document.getElementById("popup-title");
  const msgs  = document.getElementById("popup-msgs");
  const link  = document.getElementById("popup-open-chat");

  title.textContent = agent.icon + " " + agent.name;
  link.href = `/?agent=${agentId}`;
  msgs.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,.25);padding:20px">Загружаю историю...</div>';
  popup.style.display = "block";

  try {
    const key = agentId === "main"
      ? "agent%3Amain%3Atelegram%3Adirect%3A277364372"
      : encodeURIComponent(`agent:${agentId}`);
    const r = await fetch(`/api/sessions/${key}/history?limit=15`);
    const history = await r.json();

    if (!history.length) {
      msgs.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,.2);padding:20px">Нет сообщений</div>';
      return;
    }

    msgs.innerHTML = history.map(m => {
      const isUser = m.role === "user";
      const content = typeof m.content === "string" ? m.content :
        (Array.isArray(m.content) ? (m.content.find(c=>c.type==="text")?.text || "") : "");
      const preview = content.slice(0, 200) + (content.length > 200 ? "…" : "");
      return `<div style="margin-bottom:8px;padding:8px 10px;border-radius:10px;background:${isUser ? "rgba(99,102,241,.1)" : "rgba(255,255,255,.04)"};border-left:2px solid ${isUser ? "rgba(99,102,241,.5)" : "rgba(16,185,129,.3)"}">
        <div style="font-size:9px;color:rgba(255,255,255,.25);margin-bottom:3px">${isUser ? "👤 Serhii" : agent.icon + " " + agent.name}</div>
        <div style="font-size:11px;color:rgba(255,255,255,.6);line-height:1.5">${esc(preview)}</div>
      </div>`;
    }).join("");
  } catch(e) {
    msgs.innerHTML = `<div style="color:rgba(239,68,68,.7);padding:20px;font-size:11px">Ошибка: ${e.message}</div>`;
  }
}

function closeAgentPopup(e) {
  if (e && e.target !== document.getElementById("agent-popup")) return;
  document.getElementById("agent-popup").style.display = "none";
}

// Close on Escape
document.addEventListener("keydown", e => {
  if (e.key === "Escape") document.getElementById("agent-popup").style.display = "none";
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
setConnected(false);
loadSys();
setInterval(loadSys, 20000);
connectSSE();

// ─── NIGHT MODE / DEEP SPACE ──────────────────────────────────────────────────
let lastActivityTime = Date.now();
let nightModeActive = false;
let nightModeAlpha = 0; // 0 = normal, 1 = full night mode
const NIGHT_IDLE_THRESHOLD = 5 * 60 * 1000; // 5 min

// Track activity
function touchActivity() { lastActivityTime = Date.now(); }
document.addEventListener("mousemove", touchActivity);
document.addEventListener("keydown", touchActivity);

// Night mode wrapper — _renderCore does the animation, render() wraps with night overlay
function render() {
  // Check night mode
  const idleSec = Date.now() - lastActivityTime;
  const anyThinking = agents.some(a => a.status === "thinking");
  if (anyThinking) touchActivity();
  const shouldNight = idleSec > NIGHT_IDLE_THRESHOLD && !anyThinking;
  nightModeAlpha = lerp(nightModeAlpha, shouldNight ? 1 : 0, 0.005);
  nightModeActive = nightModeAlpha > 0.05;
  _renderCore();
  // Night mode overlay
  if (nightModeActive) {
    // Deep purple vignette
    const W = canvas.width, H = canvas.height;
    const vg = ctx.createRadialGradient(W/2,H/2,H*0.2, W/2,H/2,H*0.9);
    vg.addColorStop(0, `rgba(10,5,30,0)`);
    vg.addColorStop(1, `rgba(5,2,20,${nightModeAlpha * 0.4})`);
    ctx.fillStyle = vg; ctx.fillRect(0,0,W,H);
    // Night mode label
    if (nightModeAlpha > 0.5) {
      ctx.font = "10px 'JetBrains Mono', monospace";
      ctx.fillStyle = `rgba(99,102,241,${(nightModeAlpha-0.5)*0.6})`;
      ctx.textAlign = "right"; ctx.textBaseline = "bottom";
      ctx.fillText("🌙 deep space", W - 20, H - 20);
    }
    // Activity rings around planets — glowing history halos
    for (const a of agents) {
      if (a.role === "primary") continue;
      const p = pos[a.id]; if (!p) continue;
      const col = STATUS_COLOR[a.status] || STATUS_COLOR.idle;
      const t = frame * 0.008;
      for (let ring = 0; ring < 3; ring++) {
        const ringR = 32 + ring * 14 + Math.sin(t + ring * 1.2) * 4;
        const alpha = nightModeAlpha * (0.12 - ring * 0.03);
        ctx.beginPath(); ctx.arc(p.x, p.y, ringR, 0, Math.PI*2);
        ctx.strokeStyle = col.glow + alpha + ")";
        ctx.lineWidth = 1; ctx.stroke();
      }
    }
  }
}
render();
